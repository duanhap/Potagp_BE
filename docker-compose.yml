services:
  api:
    build: .
    container_name: potago_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app
    # In development, we might want to run with flask run for hot reloading
    # command: flask run --host=0.0.0.0 --port=5000
    # For production-like, use the CMD in Dockerfile (Gunicorn)
    restart: always
